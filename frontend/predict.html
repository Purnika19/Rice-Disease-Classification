<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction | Rice AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="nav-back">
            <a href="index.html" class="btn-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Home
            </a>
        </div>

        <div class="card">
            <h1>Rice Leaf Analysis</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Upload a clear image of the affected rice leaf for classification.</p>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <p>Drag & drop image or <strong>click to browse</strong></p>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </div>

            <div id="previewContainer" class="preview-container">
                <img id="imagePreview" src="" alt="Selected Leaf">
                <div style="margin-top: 1.5rem;">
                    <button id="predictBtn" class="btn btn-primary">Predict Disease</button>
                    <button id="resetBtn" class="btn" style="background: #e9ecef; color: #495057; margin-left: 10px;">Reset</button>
                </div>
            </div>

            <div id="loading" class="spinner"></div>

            <div id="resultCard" class="result-card">
                <p style="text-transform: uppercase; font-weight: 700; font-size: 0.8rem; color: var(--primary-light); letter-spacing: 1px;">Diagnosis Result</p>
                <h2 id="diseaseName">Brown Spot</h2>
                <div class="confidence-bar">
                    <div id="confidenceFill" class="confidence-fill"></div>
                </div>
                <p>Confidence: <span id="confidenceValue" style="font-weight: 700;">92%</span></p>
            </div>

            <div id="errorMessage" style="color: #d00000; margin-top: 1rem; display: none; font-weight: 600;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
